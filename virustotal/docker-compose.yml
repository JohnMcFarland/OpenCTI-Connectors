version: "3"
services:
  connector-virustotal:
    build:
      context: .
      dockerfile: Dockerfile
    image: custom/connector-virustotal:latest
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      - OPENCTI_URL=http://localhost:8080
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=VirusTotal
      - CONNECTOR_TYPE=INTERNAL_ENRICHMENT
      - CONNECTOR_SCOPE=StixFile,Artifact,IPv4-Addr,Domain-Name,Url
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_CONFIDENCE_LEVEL=50
      # CONNECTOR_AUTO=true fires enrichment on observable creation platform-wide.
      # The RFI-only gate inside the connector enforces the actual restriction —
      # observables not in a Case-Rfi container are silently skipped at runtime.
      - CONNECTOR_AUTO=true
      - CONNECTOR_ONLY_CONTEXTUAL=false

      # ── VirusTotal API ─────────────────────────────────────────────────────
      - VIRUSTOTAL_TOKEN=ChangeMe
      # Maximum TLP of observables sent to the VT API.
      # Observables marked above this level are skipped to prevent data leakage.
      - VIRUSTOTAL_MAX_TLP=TLP:AMBER
      # If true, overwrite a higher existing OpenCTI score with VT's lower value.
      # Default false — preserve the higher score.
      - VIRUSTOTAL_REPLACE_WITH_LOWER_SCORE=false

      # ── File / Artifact settings ───────────────────────────────────────────
      # Create a supplemental per-engine analysis note (in addition to the
      # structured assessment note) for file observables.
      - VIRUSTOTAL_FILE_CREATE_NOTE_FULL_REPORT=true
      # Import crowdsourced YARA rules as stix2.Indicator objects (pattern_type=yara).
      # YARA rules are the ONLY Indicator type this connector creates.
      - VIRUSTOTAL_FILE_IMPORT_YARA=true
      # Upload artifacts to VT if not already in their database.
      # Only applies to Artifact entities (not StixFile). Default false.
      - VIRUSTOTAL_FILE_UPLOAD_UNSEEN_ARTIFACTS=false

      # ── IP settings ────────────────────────────────────────────────────────
      # Create ASN (belongs-to) and Country (located-at) relationships for IPs.
      - VIRUSTOTAL_IP_ADD_RELATIONSHIPS=true

      # ── Domain settings ────────────────────────────────────────────────────
      # Create passive-DNS IPv4 observables with resolves-to relationships.
      - VIRUSTOTAL_DOMAIN_ADD_RELATIONSHIPS=true

      # ── URL settings ───────────────────────────────────────────────────────
      # Submit unseen URLs to VT for analysis before enriching. Default false.
      - VIRUSTOTAL_URL_UPLOAD_UNSEEN=false

    restart: always
